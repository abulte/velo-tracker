{% if route.garmin_course_url %}
<a href="{{ route.garmin_course_url }}" target="_blank" rel="noopener" class="link">Open in Garmin Connect</a>
<button class="btn btn-ghost btn-xs ml-2" onclick="this.closest('td').querySelector('.course-edit').style.display='block'; this.style.display='none'">Edit</button>
{% else %}
<button class="btn btn-ghost btn-xs" onclick="this.closest('td').querySelector('.course-edit').style.display='block'; this.style.display='none'">Add link</button>
{% endif %}
<span class="course-edit" style="display:none">
    <form hx-post="/routes/{{ route.id }}/course"
          hx-target="closest td"
          hx-swap="innerHTML"
          class="join">
        <input type="url" name="garmin_course_url"
               value="{{ route.garmin_course_url or '' }}"
               placeholder="https://connect.garmin.com/modern/course/…"
               class="input input-bordered input-sm join-item"
               style="min-width:300px;">
        <button type="submit" class="btn btn-primary btn-sm join-item">Save</button>
    </form>
</span>
