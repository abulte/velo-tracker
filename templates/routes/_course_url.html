{% if route.garmin_course_url %}
<a href="{{ route.garmin_course_url }}" target="_blank" rel="noopener">Open in Garmin Connect</a>
<button onclick="this.closest('td').querySelector('.course-edit').style.display='block'; this.style.display='none'">Edit</button>
{% else %}
<button onclick="this.closest('td').querySelector('.course-edit').style.display='block'; this.style.display='none'">Add link</button>
{% endif %}
<span class="course-edit" style="display:none">
    <form hx-post="/routes/{{ route.id }}/course"
          hx-target="closest td"
          hx-swap="innerHTML"
          style="display:inline-flex; gap:.5rem; align-items:center;">
        <input type="url" name="garmin_course_url"
               value="{{ route.garmin_course_url or '' }}"
               placeholder="https://connect.garmin.com/modern/course/…"
               style="min-width:300px;">
        <button type="submit">Save</button>
    </form>
</span>
