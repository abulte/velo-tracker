<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Velo Tracker{% endblock %}</title>
    <script>
        document.documentElement.setAttribute('data-theme',
            window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dim' : 'light');
    </script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    {% block head %}{% endblock %}
</head>
<body>
    <div class="navbar bg-base-100 shadow-sm px-4">
        <div class="navbar-start">
            <a href="/" class="btn btn-ghost text-xl font-bold">Velo Tracker</a>
        </div>
        <div class="navbar-end">
            <ul class="menu menu-horizontal px-1">
                <li><a href="/dashboard">Dashboard</a></li>
                <li><a href="/activities">Activities</a></li>
                <li><a href="/routes">Routes</a></li>
                <li><a href="/goals">Goals</a></li>
                <li><a href="/profile">Profile</a></li>
            </ul>
        </div>
    </div>

    <main class="w-full max-w-7xl mx-auto px-4 pb-16 pt-6">
        {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
            <div role="alert" class="alert alert-warning mb-4">
                <span>{{ message }}</span>
            </div>
            {% endfor %}
        {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>

    <script>
        document.body.addEventListener('htmx:responseError', (e) => {
            alert('Error: ' + e.detail.xhr.status);
        });
    </script>
</body>
</html>
