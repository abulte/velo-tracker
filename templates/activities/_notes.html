<div id="notes-section">
    {% if activity.notes %}
    <p>{{ activity.notes }}</p>
    {% else %}
    <p><em>No notes.</em></p>
    {% endif %}

    <button onclick="document.getElementById('notes-dialog').showModal()">Edit</button>

    <dialog id="notes-dialog">
        <form hx-post="/activities/{{ activity.garmin_id }}/notes"
              hx-target="#notes-section"
              hx-swap="outerHTML"
              hx-on::after-request="document.getElementById('notes-dialog').close()">
            <textarea name="notes" rows="6" style="width:100%">{{ activity.notes or "" }}</textarea>
            <button type="submit">Save</button>
        </form>
    </dialog>
</div>
